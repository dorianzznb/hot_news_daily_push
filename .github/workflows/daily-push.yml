name: 每日热点新闻推送

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  daily-news-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: 创建环境变量
        run: |
          cat > .env << 'ENVEOF'
          FSKEY=${{ secrets.FSKEY }}
          SUMMARY_MODEL=${{ secrets.SUMMARY_MODEL || 'deepseek' }}
          DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
          HUNYUAN_API_KEY=${{ secrets.HUNYUAN_API_KEY }}
          TECH_ONLY=${{ secrets.TECH_ONLY || 'True' }}
          SKIP_CONTENT=${{ secrets.SKIP_CONTENT || 'False' }}
          HOTSPOT_LIMIT=${{ secrets.HOTSPOT_LIMIT || '10' }}
          ENVEOF
      - run: python hot_news_main.py
